<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Facture Asso / Grist</title>

    <!-- Un modèle de facture d'association à but non-lucratif (de droit local Alsace-Moselle en France) pour Grist -->
    <!-- Utilise Vue.js, moment, et le Plugin API de Grist -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.3/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

    <script src="invoice.js?ver=11"></script>
    <script src="exampleData.js"></script>

    <link rel="stylesheet" href="invoice.css?ver=17">
  </head>
  <body>
    <div id="app">
      <div class="status" v-if="status">
        <template v-if="status === 'waiting'">
          <p>En attente des données...</p>
          <ul>
            <li v-bind:class="[tableConnected ? 'done' : '']">J'ai besoin des <b>accès en lecture</b></li>
            <li v-bind:class="[haveRows ? 'done' : '']">J'ai besoin d'au moins une colonne de données.</li>
            <li v-bind:class="[rowConnected ? 'done' : '']">J'ai besoin que <b>Select By</b>soit paramétré.</li>
          </ul>
          <p>Exemples :</p>
          <ul>
            <li><a class="button" href="index.html?demo=1">Une facture remplie</a></li>
            <li><a class="button" href="index.html?labels=1">Une facture étiquettée</a></li>
          </ul>
        </template>
        <template v-else>
          {{ status }}
        </template>
      </div>
      <div class="invoice" v-if="invoice">
        <template v-if="invoice">
          <div class="top">
            <div class="block">
              <div class="header">
                <div class="meta title">Facture</div>
              </div>
              <div class="info"><span class="meta">Invoice Number</span> N° de facture{{ invoice.Number }}</div>
              <div class="info" v-if="invoice.Issued"><div class="meta date-tag">Date</div> {{ invoice.Issued | asDate }}</div>
              <div class="info" v-if="invoice.Due"><div class="meta date-tag">Échéance</div> {{ invoice.Due | asDate }}</div>
            </div>
            
            <div class="supplier">
              <div v-for="business in (invoice.Invoicer ? [invoice.Invoicer] : [])">
                <template v-if="typeof(business) === 'string'">
                  <div class="address newlined">{{ business }}</div>
                </template>
                <template v-else>
                  <div class="address">
                    <span class="name">{{ business.Name }}</span><br />
                    {{ business.Street1 }}<br />
                    <template v-if="business.Street2">
                      {{ business.Street2 }}<br />
                    </template>
                    {{ business.City }} {{ business.State }} {{ business.Zip }}<br />
                    <template v-if="business.Country">
                      {{ business.Country }}<br />
                    </template>
                    <template v-if="business.Email">
                      {{ business.Email }}<br />
                    </template>
                    <template v-if="business.Siret">
                      {{ business.Siret }}<br />
                    </template>
                  </div>
                  <template v-if="business.Email">
                    <div class="email">{{ business.Email }}</div>
                  </template>
                  <template v-if="business.Phone">
                    <div class="phone">{{ business.Phone }}</div>
                  </template>
                  <template v-if="business.Website">
                    <div class="website"><a v-bind:href="business.Url">{{ business.Website }}</a></div>
                  </template>
                  <template v-if="business.Iban">
                    <div class="IBAN">{{ business.Iban }}</div>
                  </template>
                </template>
              </div>
            </div>
          </div>
          
          <div class="client" v-for="business in (invoice.Client ? [invoice.Client] : [])">
            <div class="title">Client</div>
            <div class="details">
              <template v-if="typeof(business) === 'string'">
                <div class="newlined">{{ business }}</div>
              </template>
              <template v-else>
                <div>{{ business.Name }}</div>
                <template v-if="business.Street1">
                  {{ business.Street1 }},
                </template>
                <template v-if="business.Street2">
                  {{ business.Street2 }},
                </template>
                {{ business.City }} {{ business.State }} {{ business.Zip }}
                <template v-if="business.Country">
                  <br />{{ business.Country }}
                </template>
              </template>
            </div>
          </div>

          <table class="items">
            <template v-if="!Array.isArray(invoice.Items)">
              <tr>
                <th>Description</th>
                <th class="money">Total</th>
              </tr>
              <tr>
                <td>{{ invoice.Items }}</td>
                <td class="money">{{ invoice.Total | currency }}</td>
              </tr>
            </template>
            <template v-else>
              <tr>
                <th>Description</th>
                <th class="money">Prix u.</th>
                <th class="number">Quantité</th>
                <th class="money">Total</th>
              </tr>
              <tr v-for="item in invoice.Items">
                <td>{{ item.Description }}</td>
                <td class="money">{{ item.Price | currency }}</td>
                <td class="number">{{ item.Quantity }}</td>
                <td class="money">{{ item.Total | currency }}</td>
              </tr>
            </template>
          </table>

          <div class="summary">
            <div class="part">
              <div class="title">Sous-total</div>
              <div class="details">{{ invoice.Subtotal | currency }}</div>
            </div>
            <div class="part">
              <div class="title">Réduction</div>
              <div class="details">{{ invoice.Deduction | currency }}</div>
            </div>
            <div class="part">
              <div class="title">TVA</div>
              <div class="details">{{ invoice.Taxes | currency }}</div>
            </div>
            <div class="total">
              <div class="title">Total TTC</div>
              <div class="details">{{ invoice.Total | currency }}</div>
            </div>
          </div>

          <template v-if="invoice.Note">
            <p class="note">TVA non applicable, art. 261 du CGI.</p>
            <p class="note">Règlement en espèces ou virement bancaire à livraison.</p>
            <p class="note">{{ invoice.Note }}</p>
          </template>
              
          <p class="note">Signature ou cachet du client, précédée de la mention « bon pour accord » :</p>

          <template v-for="help in (invoice.Help ? [invoice.Help] : [])">
            <div class="help">
              <div class="help-close">
                Ajouter une colonne <span class="column-name">Échance</span> ou <span class="column-name">Date</span> pour cacher cette zone.
              </div>
              <div class="title">Column information</div>
              <div class="details">
                <table>
                  <tr v-for="group in ['recognized', 'expected', 'ignored']">
                    <td class="key">{{ group }}</td>
                    <td>
                      <template v-if="group in help">
                        <div v-bind:class="['column-name', 'column-' + group]" v-for="col in help[group]">{{col}}</div>
                      </template>
                      <template v-else>
                        &mdash;
                      </template>
                    </td>
                  </tr>
                </table>
                <template v-if="invoice.SuggestReferencesColumn">
                  <div>For structured address and item information, add a <span class="column-name">References</span> column with this formula:</div>
                  <div>
                    <pre>RECORD(rec, expand_refs=1)</pre>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <template v-if="invoice.Paid">
            <div class="paid">
              Payée
            </div>
          </template>

          <div class="footer">
            <div class="thanks">
              Merci !
            </div>
          </div>

          <div class="print">
            <a href="javascript:window.print()">Imprimer</a>
          </div>
        </template>
      </div>
    </div>
  </body>
</html>
